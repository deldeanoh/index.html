<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dublin Live Inbound Ticker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&display=swap');
        
        :root { --blue: #00e5ff; --green: #00ff88; --gold: #ffbc00; }

        body { 
            margin: 0; 
            background: #000; 
            font-family: 'Chakra Petch', sans-serif; 
            color: white; 
            overflow: hidden; 
        }

        .ticker-container {
            width: 100vw;
            height: 60px;
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.95);
            border-bottom: 2px solid #222;
        }

        .badge {
            font-size: 14px;
            border: 1px solid #fff;
            padding: 2px 10px;
            margin: 0 20px;
            min-width: 90px;
            text-align: center;
        }

        .active-badge { background: var(--green); color: #000; border: none; }

        #data-scroll {
            font-size: 22px;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .label { color: var(--blue); font-size: 11px; margin-right: 8px; text-transform: uppercase; }
        .val { margin-right: 30px; }
        .gold { color: var(--gold); }
    </style>
</head>
<body>

<div class="ticker-container">
    <div id="status-box" class="badge">BOOTING</div>
    <div id="data-scroll">CONNECTING TO DUBLIN AIR TRAFFIC...</div>
</div>

<script>
    async function updateTicker() {
        const status = document.getElementById('status-box');
        const display = document.getElementById('data-scroll');
        
        // Target: Dublin Airport (EIDW) 40 mile radius
        const api = "https://api.adsb.lol/v2/lat/53.421/lon/-6.270/dist/40";
        
        try {
            // We use an ultra-reliable proxy for GitHub Pages
            const response = await fetch("https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(api));
            const data = await response.json();
            
            // Filter: Any plane descending (< -100 rate) under 10,000 feet
            const planes = (data.ac || []).filter(a => a.baro_rate < -100 && a.alt_baro < 10000);
            planes.sort((a, b) => a.alt_baro - b.alt_baro);

            if (planes.length > 0) {
                const p = planes[0];
                const landed = (p.alt_baro < 450 || p.ground);

                status.innerText = landed ? "LANDED" : "INBOUND";
                status.className = landed ? "badge active-badge" : "badge";
                
                display.innerHTML = `
                    <span class="label">FLIGHT</span><span class="val">${(p.flight || 'N/A').trim()}</span>
                    <span class="label">ALT</span><span class="val">${Math.round(p.alt_baro)} FT</span>
                    <span class="label">GS</span><span class="val">${Math.round(p.gs)} KT</span>
                    <span class="label">REG</span><span class="val gold">${p.r || '---'}</span>
                `;
            } else {
                status.innerText = "SCANNING";
                status.className = "badge";
                display.innerHTML = "WAITING FOR DESCENDING TRAFFIC NEAR DUBLIN";
            }
        } catch (e) {
            status.innerText = "OFFLINE";
            display.innerHTML = "RECONNECTING TO DATA SOURCE...";
        }
    }

    setInterval(updateTicker, 8000);
    updateTicker();
</script>
</body>
</html>
