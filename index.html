<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <title>Dublin Floating Inbound Ticker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&display=swap');

        :root {
            --neon-blue: #00e5ff;
            --success-green: #00ff88;
            --warning-gold: #ffbc00;
            --danger-red: #ff4b4b;
        }

        body {
            margin: 0;
            padding: 0;
            background: transparent; 
            font-family: 'Chakra Petch', sans-serif;
            color: white;
            overflow: hidden;
        }

        .ticker-container {
            width: 100vw;
            height: 60px;
            display: flex;
            align-items: center;
            position: relative;
        }

        .fixed-ui {
            display: flex;
            height: 36px;
            z-index: 100;
            flex-shrink: 0;
            margin-right: 15px;
            align-items: center;
        }

        /* INBOUND AIRCRAFT state: White text, no background */
        .status-text {
            color: #ffffff;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* TOUCHDOWN state: Green background, black text */
        .status-text.landed {
            background: var(--success-green);
            color: #000;
            padding: 4px 15px;
            border-radius: 2px;
            clip-path: polygon(0 0, 100% 0, 90% 100%, 0 100%);
            text-shadow: none;
        }

        .weather-box {
            padding: 0 15px;
            display: flex;
            align-items: center;
            font-weight: 700;
            color: #fff;
            font-size: 16px;
            white-space: nowrap;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.9);
        }

        .scroll-window {
            flex-grow: 1;
            overflow: hidden;
            position: relative;
            height: 100%;
            display: flex;
            align-items: center;
            mask-image: linear-gradient(to right, transparent, black 8%, black 92%, transparent);
        }

        #ticker-track {
            display: flex;
            position: absolute;
            left: 0;
            white-space: nowrap;
            will-change: transform;
        }

        .flight-data-segment {
            display: flex;
            align-items: center;
        }

        .data-point {
            display: flex;
            align-items: center;
            padding: 0 35px;
            font-size: 20px;
            font-weight: 700;
            text-shadow: 2px 2px 5px rgba(0,0,0,1);
        }

        .label {
            color: var(--neon-blue);
            font-size: 10px;
            text-transform: uppercase;
            margin-right: 8px;
            letter-spacing: 1px;
        }

        /* Change labels to green when aircraft lands */
        .landed-track .label { color: var(--success-green); }
        
        .val-gold { color: var(--warning-gold); }
        .vsi-down { color: var(--danger-red); font-size: 14px; margin-left: 5px; }
    </style>
</head>
<body>

<div class="ticker-container">
    <div class="fixed-ui">
        <div id="status-display" class="status-text">SCANNING</div>
        <div id="weather-box" class="weather-box">EIDW --°C</div>
    </div>
    <div class="scroll-window">
        <div id="ticker-track"></div>
    </div>
</div>

<script>
    const AIRLINES = { 
        "EIN": "AER LINGUS", "RYR": "RYANAIR", "BAW": "BRITISH AIRWAYS", "UAE": "EMIRATES",
        "DAL": "DELTA", "UAL": "UNITED", "AFR": "AIR FRANCE", "KLM": "KLM",
        "EAI": "AER LINGUS REG", "STK": "AER LINGUS REG", "THY": "TURKISH", "DLH": "LUFTHANSA",
        "EZY": "EASYJET", "EXS": "JET2", "SAS": "SAS", "SWR": "SWISS", "TAP": "TAP PORTUGAL",
        "UPS": "UPS AIRLINES"
    };

    const EIDW_ELEV = 242; 
    let trackPos = 0;
    let stickyReg = null; 
    let statusUntil = 0;
    let lastKnownData = null;

    async function updateWeather() {
        try {
            const r = await fetch("https://api.openweathermap.org/data/2.5/weather?lat=53.42&lon=-6.27&appid=1d7cac11a5d9e5438e22ee1177484c31&units=metric");
            const d = await r.json();
            document.getElementById('weather-box').innerText = `EIDW ${Math.round(d.main.temp)}°C | ${d.wind.deg}° @ ${Math.round(d.wind.speed * 1.94)}KT`;
        } catch (e) {}
    }

    function getRunway(track) {
        if (track >= 190 && track <= 360) return "28L";
        if (track >= 10 && track <= 180) return "10R";
        return "TBD";
    }

    function buildContent(p, isLanded) {
        if (!p) return `<div class="data-point">MONITORING DUBLIN ARRIVALS...</div>`;

        const callsign = (p.flight || "N/A").trim();
        const alt = parseInt(p.alt_baro) || 0;
        const vsi = parseInt(p.baro_rate) || 0;
        const rwy = getRunway(p.track);

        return `
            <div class="data-point"><span class="label">Flight</span>${callsign}</div>
            <div class="data-point"><span class="label">Airline</span>${AIRLINES[callsign.substring(0,3)] || "PRIVATE"}</div>
            <div class="data-point"><span class="label">Altitude</span>${isLanded ? 'TOUCHDOWN' : alt.toLocaleString() + ' FT'} ${(!isLanded && vsi < 0) ? `<span class="vsi-down">▼${Math.abs(vsi)}</span>` : ''}</div>
            <div class="data-point"><span class="label">Speed</span>${Math.round(p.gs || 0)} KT</div>
            <div class="data-point"><span class="label">Distance</span>${parseFloat(p.dst || 0).toFixed(1)} NM</div>
            <div class="data-point"><span class="label">Runway</span><span class="val-gold">${rwy}</span></div>
        `;
    }

    async function fetchData() {
        try {
            const r = await fetch("https://adsb-proxy1.vercel.app/api/adsb");
            const data = await r.json();
            const now = Date.now();
            const statusLabel = document.getElementById('status-display');
            const track = document.getElementById('ticker-track');

            let activePlane = null;
            let isLanded = false;

            if (stickyReg && now < statusUntil) {
                activePlane = data.ac.find(a => a.r === stickyReg) || lastKnownData;
                isLanded = true;
            } else {
                let inbounds = data.ac.filter(a => {
                    const alt = (a.alt_baro || 0);
                    const vsi = parseInt(a.baro_rate) || 0;
                    // Filter: Descending and within range
                    return alt < 5000 && a.dst < 15 && (vsi < -50 || alt < 500);
                });
                
                inbounds.sort((a,b) => a.dst - b.dst);

                if (inbounds.length > 0) {
                    activePlane = inbounds[0];
                    const alt = (activePlane.alt_baro || 0);
                    // Landing trigger
                    if ((alt <= EIDW_ELEV + 10 && activePlane.dst < 0.3) || activePlane.ground === true) {
                        stickyReg = activePlane.r;
                        lastKnownData = activePlane;
                        statusUntil = now + 25000;
                        isLanded = true;
                    }
                }
            }

            if (isLanded) {
                statusLabel.innerText = "TOUCHDOWN";
                statusLabel.className = "status-text landed";
                track.className = "landed-track";
            } else if (activePlane) {
                statusLabel.innerText = "INBOUND AIRCRAFT";
                statusLabel.className = "status-text";
                track.className = "";
            } else {
                statusLabel.innerText = "SCANNING";
                statusLabel.className = "status-text";
                track.className = "";
            }

            const content = buildContent(activePlane, isLanded);
            track.innerHTML = `<div class="flight-data-segment">${content}</div><div class="flight-data-segment">${content}</div><div class="flight-data-segment">${content}</div>`;
        } catch(e) {}
    }

    function animate() {
        const track = document.getElementById('ticker-track');
        const firstSegment = track.querySelector('.flight-data-segment');
        if (firstSegment) {
            const segmentWidth = firstSegment.offsetWidth;
            trackPos -= 1.1; 
            if (Math.abs(trackPos) >= segmentWidth) trackPos = 0;
            track.style.transform = `translateX(${trackPos}px)`;
        }
        requestAnimationFrame(animate);
    }

    updateWeather();
    fetchData();
    setInterval(updateWeather, 60000);
    setInterval(fetchData, 2000);
    animate();
</script>
</body>
</html>
