<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Dublin Live Ticker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@700&display=swap');
        :root { --blue: #00e5ff; --green: #00ff88; --gold: #ffbc00; }
        body { margin: 0; background: #000; font-family: 'Chakra Petch', sans-serif; color: white; overflow: hidden; }
        .ticker-container { width: 100vw; height: 60px; display: flex; align-items: center; background: rgba(0,0,0,0.9); border-bottom: 2px solid #222; }
        .badge { font-size: 14px; border: 1px solid #fff; padding: 2px 10px; margin: 0 20px; min-width: 90px; text-align: center; text-transform: uppercase; }
        .active-badge { background: var(--green); color: #000; border: none; }
        #data-scroll { font-size: 22px; white-space: nowrap; }
        .label { color: var(--blue); font-size: 11px; margin-right: 8px; text-transform: uppercase; }
        .val { margin-right: 30px; }
        .gold { color: var(--gold); }
    </style>
</head>
<body>
<div class="ticker-container">
    <div id="status-box" class="badge">CONNECTING</div>
    <div id="data-scroll">FETCHING DUBLIN AIR TRAFFIC...</div>
</div>

<script>
    async function updateTicker() {
        const status = document.getElementById('status-box');
        const display = document.getElementById('data-scroll');
        // Dublin Airport coordinates
        const api = "https://api.adsb.lol/v2/lat/53.421/lon/-6.270/dist/40";
        
        try {
            const response = await fetch("https://api.codetabs.com/v1/proxy?quest=" + encodeURIComponent(api));
            const data = await response.json();
            
            // LOGIC: Filter for any aircraft that has an altitude reported
            let planes = (data.ac || []).filter(a => a.alt_baro !== undefined && a.alt_baro !== null);
            
            // SORT: Put the lowest aircraft first (the one about to land)
            planes.sort((a, b) => a.alt_baro - b.alt_baro);

            if (planes.length > 0) {
                const p = planes[0]; // The lowest plane
                const landed = (p.alt_baro < 450 || p.ground);

                status.innerText = landed ? "LANDED" : "INBOUND";
                status.className = landed ? "badge active-badge" : "badge";
                
                // Use Flight Number, but if it's missing, use the Registration (Tail Number)
                let callsign = (p.flight || p.r || "N/A").trim();

                display.innerHTML = `
                    <span class="label">IDENT</span><span class="val">${callsign}</span>
                    <span class="label">ALT</span><span class="val">${Math.round(p.alt_baro)} FT</span>
                    <span class="label">GS</span><span class="val">${Math.round(p.gs || 0)} KT</span>
                    <span class="label">REG</span><span class="val gold">${p.r || '---'}</span>
                `;
            } else {
                status.innerText = "SCANNING";
                status.className = "badge";
                display.innerHTML = "SEARCHING FOR AIRCRAFT NEAR DUBLIN...";
            }
        } catch (e) {
            status.innerText = "RETRYING";
            console.log("Data error:", e);
        }
    }

    // Refresh every 5 seconds for snappier updates
    setInterval(updateTicker, 5000);
    updateTicker();
</script>
</body>
</html>
